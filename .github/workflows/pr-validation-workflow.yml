# This GitHub Actions workflow validates pull requests by executing a series of tasks to ensure code quality and compatibility with Salesforce Orgs.
name: pr-validation-workflow

on:
  # This workflow contains a single job called "pr-validation"
  workflow_call:
    inputs:
      # Specifying the required inputs for this reusable workflow
      WORKFLOW_TYPE:
        required: true
        type: string
      AUTH_ORG_ALIAS:
        required: true
        type: string
      BASE_BRANCH:
        required: true
        type: string

    # Specifying the required secrets for this reusable workflow
    secrets:
      SF_CLIENT_ID:
        required: true
      SF_JWT_PRIVATE_KEY:
        required: true
      SF_USERNAME:
        required: true
      SF_INSTANCE_URL:
        required: true
      DOCKER_HUB_UN:
        required: true
      DOCKER_HUB_PW:
        required: true

jobs:
  pr-validation:
    name: ${{ github.event.pull_request.head.ref }} --> ${{ github.event.pull_request.base.ref }}
    runs-on: ubuntu-latest

    # Setting some environment variables so that it can be utilized in upcoming shell scripts
    env:
      WORKFLOW_TYPE: ${{ inputs.WORKFLOW_TYPE }}
      AUTH_ORG_ALIAS: ${{ inputs.AUTH_ORG_ALIAS }}
      BASE_BRANCH: ${{ inputs.BASE_BRANCH }}
      CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
      USERNAME: ${{ secrets.SF_USERNAME }}
      INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
      SECURE_FILE: /tmp/server.key
      SFDX_DISABLE_DNS_CHECK: true
      FORCE_SHOW_SPINNER: true

    # Docker container load
    # container:
    #   image: indrajitck/sfdx-cli-image:latest
    #   credentials:
    #     username: ${{ secrets.DOCKER_HUB_UN }}
    #     password: ${{ secrets.DOCKER_HUB_PW }}

    # Steps represent a sequence of tasks that will be executed as part of the job.
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Setup Node (comes pre-installed on ubuntu-latest)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Restore caches 
      - name: Restore SF CLI & plugins cache
        id: cache-sf
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/node_modules/@salesforce
            /usr/local/lib/node_modules/sfdx-git-delta
            /usr/local/lib/node_modules/@mshanemc
            /usr/local/lib/node_modules/skuid-sfdx
            /usr/local/bin/sf
            /usr/local/bin/sfdx
            ~/.config/sf
            ~/.sfdx
          key: sf-cli-plugins-v1-${{ runner.os }}
          restore-keys: |
            sf-cli-plugins-v1-${{ runner.os }}

      - name: Restore Java cache
        id: cache-java
        uses: actions/cache@v4
        with:
          path: /usr/lib/jvm/java-17-openjdk-amd64
          key: java-17-${{ runner.os }}-v1

      # ── Install dependencies 
      - name: Install dependencies
        env:
          SF_CACHE_HIT: ${{ steps.cache-sf.outputs.cache-hit }}
          JAVA_CACHE_HIT: ${{ steps.cache-java.outputs.cache-hit }}
        run: |
          # ── Salesforce CLI & plugins ──
          if [ "$SF_CACHE_HIT" != "true" ]; then
            echo ">>> Installing Salesforce CLI..."
            npm install @salesforce/cli@latest -g

            echo ">>> Installing sfdx-git-delta..."
            echo 'y' | sf plugins install sfdx-git-delta

            echo ">>> Installing SFDMU..."
            sf plugins install sfdmu

            echo ">>> Installing SFDX Scanner..."
            sf plugins install @salesforce/sfdx-scanner

            echo ">>> Installing Skuid SFDX..."
            echo 'y' | sf plugins install skuid-sfdx
          else
            echo "✓ SF CLI & plugins restored from cache"
          fi

          # ── Java 17 ──
          if [ "$JAVA_CACHE_HIT" != "true" ]; then
            echo ">>> Installing Java 17..."
            sudo apt-get update -qq
            sudo apt-get install -y openjdk-17-jre-headless
            sudo apt-get clean
          else
            echo "✓ Java 17 restored from cache"
          fi

          # ── Always set JAVA_HOME (cache restore doesn't do this) ──
          echo "/usr/local/bin" >> $GITHUB_PATH                    
          echo "SF_HOME=$HOME/.config/sf" >> $GITHUB_ENV             
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV   
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

          # ── Verify ──
          echo "--- Versions ---"
          sf --version
          sf plugins
          java -version

      # Reads the JWT private key from the GitHub secret and writes it to a temporary file with appropriate permissions
      - name: Write JWT Private Key
        run: |
          echo "${{ secrets.SF_JWT_PRIVATE_KEY }}" > /tmp/server.key
          chmod 600 /tmp/server.key
        shell: bash

      # Authenticate with the Org
      - name: Salesforce Authentication
        run: chmod +x ./cicd-utils/scripts-util/authenticateorg.sh && ./cicd-utils/scripts-util/authenticateorg.sh
        shell: bash

      # Generate Delta Package
      - name: Delta Package Generation
        run: chmod +x ./cicd-utils/scripts-util/generatedeltapkg.sh && ./cicd-utils/scripts-util/generatedeltapkg.sh
        shell: bash

      # Instantiate static code scan using PMD
      - name: Static Code Analysis (PMD)
        run: chmod +x ./cicd-utils/scripts-util/scanner.sh && ./cicd-utils/scripts-util/scanner.sh
        shell: bash

      # Dynamically generate test class list
      - name: Test Class List Generation
        run: chmod +x ./cicd-utils/scripts-util/generatetestclass.sh && bash cicd-utils/scripts-util/generatetestclass.sh
        shell: bash

      # Validate the components & test class coverage
      - name: Component Validation
        run: chmod +x ./cicd-utils/scripts-util/validateComponents.sh && ./cicd-utils/scripts-util/validateComponents.sh
        shell: bash

      # Upload Artifacts
      - name: Publish Results (Upload Artifacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Build-Report
          path: pipeline-artifacts