# This is a basic workflow to help you get started with Actions
name: Manual Deployment

# Controls when the action will run.
on:
  workflow_dispatch:
    # A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  dev-promote:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'dev' }}
    name: DEV
    uses: ./.github/workflows/deployment-workflow.yml
    with:
      WORKFLOW_TYPE: DEPLOYMENT
      AUTH_ORG_ALIAS: Dev
    secrets:
      SF_CLIENT_ID: ${{ secrets.DEV_SF_CLIENT_ID }}
      SF_JWT_PRIVATE_KEY: ${{ secrets.DEV_SF_JWT_PRIVATE_KEY }}
      SF_USERNAME: ${{ secrets.DEV_SF_USERNAME }}
      SF_INSTANCE_URL: ${{ secrets.DEV_SF_INSTANCE_URL }}
      DOCKER_HUB_UN: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PW: ${{ secrets.DOCKER_HUB_PASSWORD }}

  # Job to deploy components to the PREPROD environment
  prod-promote:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'master' }}
    name: PROD
    # Utilizing the dynamic yml file for reusability
    uses: ./.github/workflows/deployment-workflow.yml
    with:
      WORKFLOW_TYPE: DEPLOYMENT
      AUTH_ORG_ALIAS: Production
    secrets:
      PROD_ORG_DOMAIN: ${{ secrets.PROD_ORG_DOMAIN }}
      SECRET_URL_PATH: ${{ secrets.PROD_ORG_AUTH_URL }}
      DOCKER_HUB_UN: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PW: ${{ secrets.DOCKER_HUB_PASSWORD }}