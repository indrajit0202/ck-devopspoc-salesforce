# Define a workflow to execute deployment upon merge into specific branches
name: Auto Deployment

# Trigger the workflow on merge events into specific branches
on:
  push:
    branches:
      - "dev"
      - "qa"
      - "uat"
      - "preprod"

jobs:
  # Job to deploy components to the DEV environment
  dev-promote:
    if: ${{ github.event_name == 'push' && github.ref_name == 'dev' }}
    name: DEV
    uses: ./.github/workflows/deployment-workflow.yml
    with:
      WORKFLOW_TYPE: DEPLOYMENT
      AUTH_ORG_ALIAS: Dev
    secrets:
      SF_CLIENT_ID: ${{ secrets.DEV_SF_CLIENT_ID }}
      SF_JWT_PRIVATE_KEY: ${{ secrets.DEV_SF_JWT_PRIVATE_KEY }}
      SF_USERNAME: ${{ secrets.DEV_SF_USERNAME }}
      SF_INSTANCE_URL: ${{ secrets.DEV_SF_INSTANCE_URL }}
      # DOCKER_HUB_UN: ${{ secrets.DOCKER_HUB_USERNAME }}
      # DOCKER_HUB_PW: ${{ secrets.DOCKER_HUB_PASSWORD }}

  # Job to deploy components to the QA environment
  qa-promote:
    if: ${{ github.event_name == 'push' && github.ref_name == 'qa' }}
    name: QA
    # Utilizing the dynamic yml file for reusability
    uses: ./.github/workflows/deployment-workflow.yml
    with:
      WORKFLOW_TYPE: DEPLOYMENT
      AUTH_ORG_ALIAS: Qa
    secrets:
      SECRET_URL_PATH: ${{ secrets.QA_ORG_AUTH_URL }}
      DOCKER_HUB_UN: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PW: ${{ secrets.DOCKER_HUB_PASSWORD }}

  # Job to deploy components to the UAT environment
  uat-promote:
    if: ${{ github.event_name == 'push' && github.ref_name == 'uat' }}
    name: UAT
    # Utilizing the dynamic yml file for reusability
    uses: ./.github/workflows/deployment-workflow.yml
    with:
      WORKFLOW_TYPE: DEPLOYMENT
      AUTH_ORG_ALIAS: Uat
    secrets:
      SECRET_URL_PATH: ${{ secrets.UAT_ORG_AUTH_URL }}
      DOCKER_HUB_UN: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PW: ${{ secrets.DOCKER_HUB_PASSWORD }}

  # Job to deploy components to the PREPROD environment
  preprod-promote:
    if: ${{ github.event_name == 'push' && github.ref_name == 'preprod' }}
    name: PREPROD
    # Utilizing the dynamic yml file for reusability
    uses: ./.github/workflows/deployment-workflow.yml
    with:
      WORKFLOW_TYPE: DEPLOYMENT
      AUTH_ORG_ALIAS: Preprod
    secrets:
      SECRET_URL_PATH: ${{ secrets.PREPROD_ORG_AUTH_URL }}
      DOCKER_HUB_UN: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PW: ${{ secrets.DOCKER_HUB_PASSWORD }}